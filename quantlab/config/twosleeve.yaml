# Two-sleeve: trend-following when trending + mean-reversion when chop.
# Same as default.yaml but with the MR sleeve switched on.

data:
  exchange: binance
  symbol: BTC/USDT
  market_type: spot
  timeframes: ["4h", "1d"]
  start: 2021-01-01
  end: 2026-05-31
  cache_dir: data_cache
  seed_csv: ../uyg/src/mktdata/BTC_USDT_4h.csv

orchestrator:
  use_regime: true
  use_mtf: true
  gate_mode: entry_only
  use_mr_sleeve: true

mean_reversion:
  sma_period: 20
  entry_z: 2.0
  exit_z: 0.5

seed: 42
