name: Emir Train XGBoost (Real Data)

on:
  push:
    branches: [claude/keen-hypatia-62KOz]
    paths:
      - 'emir/train_xgb_real.py'
      - '.github/workflows/emir-train-xgb.yml'
  workflow_dispatch:
    inputs:
      months:
        description: 'Kaç ay geriye eğit (4H)'
        default: '12'

permissions:
  contents: write

concurrency:
  group: emir-train-xgb
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/keen-hypatia-62KOz

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pandas numpy "ta==0.11.0" ccxt yfinance xgboost scikit-learn beautifulsoup4 lxml

      - name: Train on real data
        run: |
          set -o pipefail
          python3 emir/train_xgb_real.py --months "${{ github.event.inputs.months || '12' }}" 2>&1 | tee emir/train_log.txt

      - name: Commit results back
        if: always()   # eğitim patlasa bile log'u geri yaz (körlemesine beklememek için)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emir/xgb_real_report.md emir/ml_dataset_real.csv emir/optimal_xgb_real.json emir/train_log.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "emir: XGBoost gerçek-veri eğitim çıktısı (CI) [skip ci]"
            git push origin HEAD:claude/keen-hypatia-62KOz
          fi
